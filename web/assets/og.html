<!doctype html>
<html lang="ko"><head><meta charset="utf-8" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=IBM+Plex+Sans+KR:wght@500;700&family=IBM+Plex+Mono:wght@400&display=swap" rel="stylesheet" />
<style>
  * { margin: 0; box-sizing: border-box; }
  html, body { width: 1200px; height: 630px; }
  body {
    font-family: "Space Grotesk", "IBM Plex Sans KR", "Apple SD Gothic Neo", sans-serif;
    background:
      radial-gradient(140% 120% at 78% 6%, rgba(255,183,101,.28), rgba(232,135,58,0) 42%),
      radial-gradient(90% 90% at 72% 16%, #1a1206 0%, #0b0a0f 44%, #05070d 100%);
    color: #f4ead6; position: relative; overflow: hidden;
    padding: 72px;
  }
  .sun { position:absolute; top:-60px; right:-40px; width:340px; height:340px; border-radius:50%;
    background: radial-gradient(circle, #fff2d6 0%, #ffb765 34%, rgba(232,135,58,0) 72%); }
  .lines { position:absolute; inset:0; opacity:.18; }
  .eyebrow { font-family:"IBM Plex Mono",monospace; font-size:20px; letter-spacing:6px; color:#a2937b; }
  .wordmark { font-size:82px; font-weight:700; letter-spacing:-3px; margin-top:38px; }
  .head { font-size:44px; font-weight:700; letter-spacing:-1.5px; margin-top:14px;
    background:linear-gradient(90deg,#ffd7a0,#ffb765); -webkit-background-clip:text; background-clip:text; color:transparent; }
  .sub { font-size:24px; color:#a2937b; margin-top:22px; }
  .foot { position:absolute; left:72px; bottom:60px; font-family:"IBM Plex Mono",monospace; font-size:18px; color:#6f6552; }
  .shell { color:#ffb765; }
</style></head>
<body>
  <div class="sun"></div>
  <svg class="lines" viewBox="0 0 1200 630"><g stroke="#ffb765" stroke-width="1" fill="none">
    <path d="M980 90 L640 300 L300 210 M980 90 L840 360 M640 300 L520 470 M300 210 L150 360"/></g>
    <g fill="#ffb765"><circle cx="300" cy="210" r="4"/><circle cx="640" cy="300" r="5"/><circle cx="840" cy="360" r="4"/><circle cx="520" cy="470" r="3.5"/><circle cx="150" cy="360" r="3"/></g>
  </svg>
  <div class="eyebrow">EVIDENCE-TO-DECISION · ALPHA</div>
  <div class="wordmark"><span class="shell">◗</span> OpenOyster</div>
  <div class="head">지식으로 생각하고 결정한다.</div>
  <div class="sub">OpenCrab이 지식을 만들면, OpenOyster는 그 지식으로 결정한다.</div>
  <div class="foot">PACKS · EVIDENCE · DECISION DOSSIER &nbsp;—&nbsp; an OpenCrab fan project</div>
</body></html>
