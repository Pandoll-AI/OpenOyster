<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- OpenOyster mark: an oyster shell cradling a glowing pearl (decision) -->
  <defs>
    <radialGradient id="pearl" cx="50%" cy="42%" r="60%">
      <stop offset="0%" stop-color="#fff6e2"/>
      <stop offset="45%" stop-color="#ffd7a0"/>
      <stop offset="100%" stop-color="#e8873a"/>
    </radialGradient>
    <linearGradient id="shell" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffb765"/>
      <stop offset="100%" stop-color="#d4762e"/>
    </linearGradient>
  </defs>
  <!-- fan shell -->
  <path d="M256 96
           C150 96 96 176 96 256
           C96 360 176 416 256 416
           C336 416 416 360 416 256
           C416 176 362 96 256 96 Z"
        fill="none" stroke="url(#shell)" stroke-width="20" opacity="0.28"/>
  <!-- scallop ribs -->
  <g stroke="url(#shell)" stroke-width="14" stroke-linecap="round" opacity="0.85" fill="none">
    <path d="M256 300 L256 150"/>
    <path d="M256 300 L188 168"/>
    <path d="M256 300 L324 168"/>
    <path d="M256 300 L138 214"/>
    <path d="M256 300 L374 214"/>
  </g>
  <!-- pearl / decision -->
  <circle cx="256" cy="322" r="52" fill="url(#pearl)"/>
  <circle cx="256" cy="322" r="52" fill="none" stroke="#fff6e2" stroke-width="3" opacity="0.5"/>
</svg>
