<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>OpenOyster — Galaxy</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
--bg:#04060c;--panel:rgba(9,11,16,.93);--stroke:rgba(255,255,255,.08);--stroke2:rgba(255,255,255,.14);
--txt:#ece7db;--dim:#9a938a;--dim2:#645f56;--pos:#f0a441;--neg:#8593a8;--green:#4ade80;--amber:#f0a441;
--sans:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;--disp:'Space Grotesk',sans-serif;
--mono:'JetBrains Mono',ui-monospace,monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--txt);font-family:var(--sans);-webkit-font-smoothing:antialiased}
button{font-family:inherit;background:none;border:0;color:inherit;cursor:pointer}
#stage{position:fixed;inset:0}
canvas{display:block}

/* top nav */
#topnav{position:fixed;top:0;left:0;right:0;height:38px;z-index:40;display:flex;align-items:center;gap:14px;
padding:0 12px;background:rgba(5,7,11,.86);backdrop-filter:blur(10px);border-bottom:1px solid rgba(255,255,255,.05)}
.logo{display:flex;align-items:baseline;gap:6px;margin-right:6px;white-space:nowrap}
.logo .mark{color:var(--pos);font-size:13px}
.logo b{font-family:var(--disp);font-weight:700;font-size:14.5px;letter-spacing:-.01em}
.logo .beta{font-size:8.5px;letter-spacing:.14em;color:var(--dim2);font-family:var(--mono)}
#tabs{display:flex;align-items:center;gap:2px;flex:0 1 auto;overflow-x:auto;scrollbar-width:none}
#tabs::-webkit-scrollbar{display:none}
#tabs .tab{font-size:10.5px;font-weight:600;letter-spacing:.08em;color:var(--dim2);padding:5px 9px;border-radius:6px;white-space:nowrap;text-transform:uppercase;font-family:var(--mono)}
#tabs .tab:hover{color:var(--dim)}
#tabs .tab.on{color:#fff}
#navright{margin-left:auto;display:flex;align-items:center;gap:10px}
#search{display:flex;align-items:center;gap:6px;background:rgba(255,255,255,.055);border:1px solid rgba(255,255,255,.07);
border-radius:8px;padding:4px 9px;min-width:150px}
#search svg{opacity:.5}
#search input{background:none;border:0;outline:none;color:var(--txt);font-size:11px;width:110px;font-family:var(--mono)}
#search input::placeholder{color:var(--dim2);font-family:var(--sans)}
#search kbd{font-size:8.5px;color:var(--dim2);border:1px solid rgba(255,255,255,.1);border-radius:4px;padding:1px 4px;font-family:var(--mono)}
.livechip{display:flex;align-items:center;gap:5px;font-size:10.5px;color:var(--dim);white-space:nowrap}
.livechip .dot{width:6px;height:6px;border-radius:50%;background:var(--pos);box-shadow:0 0 8px var(--pos)}

/* control bar */
#sublabel{position:fixed;top:44px;left:14px;z-index:38;font-size:11px;color:var(--dim2)}
#controls{position:fixed;top:64px;left:14px;right:14px;z-index:38;display:flex;align-items:center;gap:18px;font-size:10.5px}
.toggle{display:flex;align-items:center;gap:6px;color:var(--dim);cursor:pointer;user-select:none;white-space:nowrap}
.toggle .tdot{width:5px;height:5px;border-radius:50%;background:var(--dim2);transition:all .2s}
.toggle.on .tdot{background:var(--pos);box-shadow:0 0 7px var(--pos)}
.toggle .state{font-size:8.5px;letter-spacing:.1em;color:var(--dim2);font-family:var(--mono)}
.toggle.on .state{color:var(--pos)}
#recenter{display:flex;align-items:center;gap:5px;color:var(--dim);font-size:10.5px;white-space:nowrap;padding:3px 8px;
border:1px solid var(--stroke);border-radius:6px}
#recenter:hover{color:var(--txt);border-color:var(--stroke2)}
#recenter kbd{font-size:8px;color:var(--dim2);border:1px solid rgba(255,255,255,.1);border-radius:3px;padding:0 3px;font-family:var(--mono)}
#playgroup{display:flex;align-items:center;gap:9px}
#playbtn{width:24px;height:24px;border-radius:50%;border:1px solid var(--stroke2);display:flex;align-items:center;justify-content:center;color:var(--txt)}
#playbtn:hover{border-color:rgba(255,255,255,.3)}
.speed{font-size:9.5px;color:var(--dim2);padding:2px 6px;border-radius:5px;font-family:var(--mono)}
.speed.on{color:var(--txt);background:rgba(255,255,255,.09);border:1px solid rgba(255,255,255,.12)}
#timeline{position:relative;width:min(220px,24vw);height:16px;display:flex;align-items:center;cursor:pointer}
#timeline .track{width:100%;height:3px;border-radius:2px;background:rgba(255,255,255,.12);overflow:hidden}
#timeline .fill{height:100%;width:100%;background:linear-gradient(90deg,rgba(240,164,65,.5),rgba(240,164,65,.9));border-radius:2px}
#timeline .knob{position:absolute;top:50%;width:11px;height:11px;border-radius:50%;background:#eee4d0;transform:translate(-50%,-50%);box-shadow:0 0 6px rgba(255,230,190,.5)}
#livestat{display:flex;align-items:center;gap:5px;font-size:10.5px;font-weight:600;letter-spacing:.06em;white-space:nowrap}
#livestat .ldot{width:6px;height:6px;border-radius:50%;background:var(--pos);box-shadow:0 0 9px var(--pos);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.45}}
#livestat.scrub .ldot{background:#eee4d0;box-shadow:0 0 8px #eee4d0;animation:none}
#stats{margin-left:auto;display:flex;align-items:center;gap:14px;white-space:nowrap}
#stats .stat b{color:var(--txt);font-weight:600;font-family:var(--mono);font-size:10.5px}
#stats .stat span{color:var(--dim2);margin-left:4px;font-size:10px}

/* legend */
#legend{position:fixed;top:96px;left:14px;z-index:37;display:flex;gap:22px;font-size:9.5px;color:var(--dim2)}
#legend b{color:var(--dim);font-weight:500}
#legend .up{color:var(--pos)}#legend .dn{color:var(--neg)}

/* 3D HTML overlays */
#overlay{position:fixed;inset:0;z-index:10;pointer-events:none;overflow:hidden}
.clabel{position:absolute;transform:translate(-50%,-50%);font-family:var(--mono);font-weight:600;letter-spacing:.22em;
color:rgba(242,233,214,.88);text-shadow:0 0 20px rgba(240,178,90,.55),0 0 55px rgba(240,164,65,.28);
white-space:nowrap;text-transform:uppercase;text-align:center}
.clabel .rule{margin:6px auto 0;height:1px;width:78%;background:linear-gradient(90deg,transparent,rgba(240,200,140,.4),transparent)}
.plabel{position:absolute;transform:translate(-50%,0);text-align:center;white-space:nowrap}
.plabel .gauge{display:flex;flex-direction:column;align-items:center;gap:4px;margin-bottom:6px}
.plabel .pct{font-family:var(--disp);font-weight:700;color:#fff;text-shadow:0 0 14px rgba(255,240,210,.8);letter-spacing:.02em}
.plabel .pct span{font-size:.62em;font-weight:600;color:rgba(255,255,255,.82);margin-left:5px;letter-spacing:.08em}
.plabel .bar{height:3.5px;border-radius:2px;background:rgba(255,255,255,.16);overflow:hidden}
.plabel .bar i{display:block;height:100%;background:linear-gradient(90deg,#ffe9c4,#fff);border-radius:2px;box-shadow:0 0 8px rgba(255,235,200,.7)}
.plabel .nm{font-family:var(--mono);font-size:11.5px;font-weight:600;letter-spacing:.05em;color:rgba(246,239,224,.92);
text-shadow:0 1px 7px rgba(0,0,0,.9),0 0 14px rgba(240,164,65,.35)}
.plabel .st{font-family:var(--mono);font-size:9px;letter-spacing:.1em;color:rgba(214,201,178,.55);margin-top:2px;
text-shadow:0 1px 5px rgba(0,0,0,.9)}

/* hover card */
.hovercard{position:fixed;z-index:45;pointer-events:none;background:var(--panel);border:1px solid rgba(255,255,255,.09);
border-radius:10px;padding:11px 13px;min-width:196px;max-width:250px;backdrop-filter:blur(14px);
box-shadow:0 14px 50px rgba(0,0,0,.7);display:none}
.hovercard.show{display:block}
.hovercard .kind{font-size:8.5px;letter-spacing:.16em;color:var(--dim2);font-family:var(--mono);text-transform:uppercase}
.hovercard .name{font-size:12px;font-weight:600;color:#fff;margin:3px 0 8px;font-family:var(--mono)}
.hovercard .row{display:flex;justify-content:space-between;gap:16px;font-size:10.5px;padding:2.5px 0;color:var(--dim)}
.hovercard .row b{color:var(--txt);font-weight:500;font-family:var(--mono);font-size:10.5px}
.hovercard .row b.pos{color:var(--pos)}.hovercard .row b.neg{color:var(--neg)}
.hovercard .sect{margin-top:9px;padding-top:8px;border-top:1px solid rgba(255,255,255,.06)}
.hovercard .sect .sh{display:flex;justify-content:space-between;font-size:8.5px;letter-spacing:.13em;color:var(--dim2);font-family:var(--mono);margin-bottom:6px;text-transform:uppercase}
.hovercard .item{display:flex;align-items:center;gap:7px;padding:3.5px 0;font-size:10px}
.hovercard .item .thumb{width:15px;height:15px;border-radius:4px;flex:none;display:flex;align-items:center;justify-content:center;
font-size:7px;font-weight:700;font-family:var(--mono);color:#08090c}
.hovercard .item .t{flex:1;color:var(--dim);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-family:var(--mono)}
.hovercard .item .val{color:var(--pos);font-family:var(--mono);font-size:9.5px}

/* right slide-over panel */
#dimmer{position:fixed;inset:0;z-index:48;background:rgba(0,0,0,.45);backdrop-filter:blur(3px);opacity:0;pointer-events:none;transition:opacity .28s}
#dimmer.show{opacity:1;pointer-events:auto}
#rpanel{position:fixed;top:0;right:-420px;bottom:0;width:400px;max-width:92vw;z-index:50;background:rgba(8,10,15,.97);
border-left:1px solid rgba(255,255,255,.08);transition:right .3s cubic-bezier(.22,.8,.3,1);overflow-y:auto;
scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.14) transparent}
#rpanel.show{right:0}
#rpanel .close{position:absolute;top:10px;right:12px;color:var(--dim2);font-size:15px;width:26px;height:26px;border-radius:7px;display:flex;align-items:center;justify-content:center}
#rpanel .close:hover{color:#fff;background:rgba(255,255,255,.07)}
#rpanel .inner{padding:18px 20px 30px}
.rp-head{display:flex;justify-content:space-between;align-items:flex-start;gap:12px}
.rp-badges{display:flex;align-items:center;gap:7px;margin-bottom:7px}
.rp-badge{font-size:8.5px;font-weight:700;letter-spacing:.1em;padding:2.5px 7px;border-radius:5px;border:1px solid var(--stroke2);color:var(--dim);font-family:var(--mono)}
.rp-badge.hi{color:var(--pos);border-color:rgba(240,164,65,.4)}
.rp-tag{font-size:9px;color:var(--dim2);display:flex;align-items:center;gap:4px}
.rp-id{font-family:var(--mono);font-size:14.5px;font-weight:600;color:#fff;display:flex;align-items:center;gap:8px}
.rp-sub{font-size:10px;color:var(--pos);margin-top:5px;opacity:.85}
.rp-status{font-size:10px;color:var(--dim);margin-top:7px;display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.rp-status .gd{width:5px;height:5px;border-radius:50%;background:var(--green);box-shadow:0 0 6px var(--green)}
.rp-score{text-align:right;flex:none}
.rp-score b{font-family:var(--disp);font-size:30px;font-weight:700;color:#fff;line-height:1}
.rp-score span{display:block;font-size:7.5px;letter-spacing:.18em;color:var(--dim2);font-family:var(--mono);margin-top:3px}
.rp-trio{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin:16px 0 4px}
.rp-trio .cell .l{font-size:7.5px;letter-spacing:.14em;color:var(--dim2);font-family:var(--mono);text-transform:uppercase}
.rp-trio .cell .v{font-size:15.5px;font-weight:600;margin-top:3px;font-family:var(--mono)}
.rp-trio .cell .v.teal{color:var(--pos)}
.rp-pill{display:inline-flex;align-items:center;gap:5px;font-size:8.5px;letter-spacing:.1em;font-family:var(--mono);
color:var(--pos);border:1px solid rgba(240,164,65,.35);background:rgba(240,164,65,.07);padding:3px 8px;border-radius:6px;margin:10px 0 2px;text-transform:uppercase}
.rp-pill .pd{width:4px;height:4px;border-radius:50%;background:var(--pos)}
.rp-big{margin:14px 0 4px}
.rp-big .l{font-size:8px;letter-spacing:.15em;color:var(--dim2);font-family:var(--mono);display:flex;align-items:center;gap:5px;text-transform:uppercase}
.rp-big .n{font-family:var(--disp);font-size:36px;font-weight:600;color:var(--pos);text-shadow:0 0 26px rgba(240,164,65,.45);letter-spacing:-.01em;margin-top:2px}
.rp-sect{margin-top:18px}
.rp-sect .sh{display:flex;justify-content:space-between;align-items:center;font-size:8.5px;letter-spacing:.14em;color:var(--dim2);font-family:var(--mono);text-transform:uppercase}
.rp-sect .sh .warn{color:var(--amber)}
.rp-list{margin-top:8px}
.rp-item{display:flex;align-items:center;gap:9px;padding:7px 0;border-bottom:1px solid rgba(255,255,255,.045);font-size:11px;width:100%;text-align:left}
.rp-item .av{width:22px;height:22px;border-radius:6px;flex:none;display:flex;align-items:center;justify-content:center;
font-size:8.5px;font-weight:700;font-family:var(--mono);color:#0a0b0e}
.rp-item .nm{flex:1;color:var(--dim);font-family:var(--mono);font-size:10.5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.rp-item .r{color:var(--txt);font-family:var(--mono);font-size:10.5px}
.rp-item .r.g{color:var(--pos)}
.rp-note{font-size:9.5px;color:var(--dim2);margin-top:12px;display:flex;align-items:center;gap:6px}

/* footer + hints */
#footr{position:fixed;right:14px;bottom:10px;z-index:36;display:flex;align-items:center;gap:14px;font-size:9.5px;color:var(--dim2)}
#hints{position:fixed;left:14px;bottom:10px;z-index:36;font-size:8.5px;letter-spacing:.12em;color:var(--dim2);
font-family:var(--mono);text-transform:uppercase;opacity:.85}
#hints b{color:var(--dim);font-weight:500}

/* boot */
#boot{position:fixed;inset:0;z-index:60;background:var(--bg);display:flex;align-items:center;justify-content:center;transition:opacity .8s;flex-direction:column;gap:14px}
#boot.hide{opacity:0;pointer-events:none}
#boot .bl{font-family:var(--disp);font-weight:700;font-size:17px;letter-spacing:.05em}
#boot .bl span{color:var(--pos)}
#boot .bs{font-size:9.5px;letter-spacing:.24em;color:var(--dim2);font-family:var(--mono);text-transform:uppercase}
@media (max-width:900px){#stats .stat span{display:none}#legend{display:none}#timeline{width:16vw}#hints{display:none}}
</style>
</head>
<body>
<div id="stage"></div>
<div id="overlay"></div>

<nav id="topnav">
<div class="logo"><span class="mark">◈</span><b id="brand">Galaxy</b><span class="beta" id="brandTag">BETA</span></div>
<div id="tabs"></div>
<div id="navright">
<div id="search">
<svg width="11" height="11" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="6" cy="6" r="4.4"/><path d="M9.4 9.4L13 13"/></svg>
<input id="searchInput" placeholder="Search" spellcheck="false" />
<kbd>⌘K</kbd>
</div>
<div class="livechip"><span class="dot"></span>Live</div>
</div>
</nav>

<div id="sublabel">Network</div>

<div id="controls">
<div class="toggle" id="tgDrift"><span class="tdot"></span>Drift<span class="state">OFF</span></div>
<div class="toggle" id="tgCore"><span class="tdot"></span><span id="tgCoreLabel">Core</span><span class="state">OFF</span></div>
<div class="toggle" id="tgClusters"><span class="tdot"></span>Clusters only<span class="state">OFF</span></div>
<button id="recenter" title="reset view">⌖ Recenter <kbd>R</kbd></button>
<div id="playgroup">
<button id="playbtn" title="tour"><svg id="playIco" width="9" height="9" viewBox="0 0 10 10" fill="currentColor"><path d="M2 1l7 4-7 4z"/></svg></button>
<button class="speed" data-s="0.5">0.5×</button>
<button class="speed on" data-s="1">1×</button>
<button class="speed" data-s="2">2×</button>
</div>
<div id="timeline"><div class="track"><div class="fill" id="tlFill"></div></div><div class="knob" id="tlKnob" style="left:100%"></div></div>
<div id="livestat"><span class="ldot"></span><span id="liveTxt">LIVE</span></div>
<div id="stats"></div>
</div>

<div id="legend"></div>
<div class="hovercard" id="hover"></div>
<div id="dimmer"></div>
<aside id="rpanel"><button class="close" id="rpClose">✕</button><div class="inner" id="rpInner"></div></aside>
<div id="hints"><b>drag</b> orbit · <b>right-drag / space+drag</b> pan · <b>scroll</b> zoom · <b>dblclick</b> focus · <b>R</b> reset</div>
<div id="footr"><span id="ftMeta"></span></div>
<div id="boot"><div class="bl" id="bootTitle">◈ Galaxy</div><div class="bs">Loading network…</div></div>

<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"
  integrity="sha384-CI3ELBVUz9XQO+97x6nwMDPosPR5XvsxW2ua7N1Xeygeh1IxtgqtCkGfQY9WWdHu" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"
  integrity="sha384-wagZhIFgY4hD+7awjQjR4e2E294y6J2HSnd8eTNc15ZubTeQeVRZwhQJ+W6hnBsf" crossorigin="anonymous"></script>
<script>
/* Galaxy Network v2 — amber wireframe-constellation look (knowledge-graph style).
 * Data contract: window.GALAXY = { config, groups, hubs, nodes, links? } — see data-format.md.
 * Visual grammar:
 *   groups → S-curve galactic band segments with projected display labels
 *   hubs   → glowing core + thin-line "scribble tangle" constellation, sized by hub.size;
 *            top hubs get lens-flare rays
 *   nodes  → GPU shader particles orbiting their hub; orphans (hub -1) scatter below band
 *   edges  → thin additive bezier arcs: hub deps (bright), node links (dim), ambient arcs
 *   value  → particle size (sqrt), echo density, CORE score percentile

const gauss = () => (rng() + rng() + rng() - 1.5) / 1.5;

const groupColor = (gi) => (G.groups[gi] && G.groups[gi].color) || C.groupColors[gi % C.groupColors.length];
const hubGroup = (hubIdx) => G.groups.findIndex((g) => g.hubs.includes(G.hubs[hubIdx].id));
const hubById = (id) => G.hubs.find((h) => h.id === id);
const hubEdges = (h) => (h.deps || []).reduce((s, d) => s + (d[1] || 0), 0);
const tangleR = (size) => Math.min(58, 12 + Math.sqrt(size) * 1.15);

// ── state ────────────────────────────────────────────
let scene, camera, renderer, controls, raycaster;
const planets = [];            // {hub, hubIdx, group, pos, r, flared, core, spark, hit, labelEl, dim}
const groupAnchors = [];
let tablePoints = null, echoPoints = null, lineMat = null;
let nodeMeta = [];
let valuesSorted = [];
let activeGroup = -1;
let coreMode = false, clustersOnly = false, drift = false;
let tour = { playing: false, t: 1, speed: 1, curve: null, names: [] };
let hovered = null;
let spacePan = false;
const mouse = new THREE.Vector2(-2, -2);
let mousePx = { x: 0, y: 0 };
let camAnim = null;
const overlay = $('#overlay');
const VIEW = { pos: new THREE.Vector3(430, 250, 720), tgt: new THREE.Vector3(-140, -10, -60) };

// ── boot ─────────────────────────────────────────────
// init() is invoked at the very END of this IIFE — module-level let/const below
// (texture caches, _v, lastHoverCheck) must be initialized first (TDZ).
function init() {
  drift = !!C.drift;
  buildHeader();
  buildScene();
  buildGalaxy();
  bindUI();
  animate();
  flyTo(VIEW.pos.clone(), VIEW.tgt.clone(), 2600);
  setTimeout(() => $('#boot').classList.add('hide'), 700);
  setTimeout(() => { $('#boot').style.display = 'none'; }, 1700); // drop the full-screen layer after the fade
}

// ── header/stats ─────────────────────────────────────
function buildHeader() {
  const st = $('#stats');
  C.stats.forEach((s) => {
    const d = document.createElement('div');
    d.className = 'stat';
    d.innerHTML = '<b>' + esc(fmt(s.value)) + '</b><span>' + esc(s.label) + '</span>';
    st.appendChild(d);
  });
  $('#ftMeta').textContent = C.footer;
  const lg = $('#legend');
  C.legend.forEach((l) => {
    const sp = document.createElement('span');
    sp.innerHTML = l; // trusted: comes from builder config, may contain <b>/<span class="up|dn">
    lg.appendChild(sp);
  });
  const tabs = $('#tabs');
  const mk = (label, idx) => {
    const b = document.createElement('button');
    b.className = 'tab' + (idx === -1 ? ' on' : '');
    b.textContent = label;
    b.addEventListener('click', () => selectGroup(idx, b));
    tabs.appendChild(b);
  };
  mk('ALL', -1);
  G.groups.forEach((g, i) => mk(g.name, i));
  if (G.nodes.some((n) => n[1] < 0)) mk(C.otherLabel, -2);
}

function selectGroup(idx, btn) {
  activeGroup = idx;
  document.querySelectorAll('#tabs .tab').forEach((t) => t.classList.remove('on'));
  btn.classList.add('on');
  if (tablePoints) tablePoints.material.uniforms.uGroup.value = idx;
  if (lineMat) lineMat.uniforms.uGroup.value = idx;
  planets.forEach((p) => { p.dim = idx >= 0 && p.group !== idx; });
  if (idx >= 0) {
    const a = groupAnchors[idx];
    flyTo(a.pos.clone().add(new THREE.Vector3(40, a.radius * 0.9, a.radius * 2.1)), a.pos.clone(), 1400);
  } else if (idx === -2) {
    flyTo(new THREE.Vector3(120, -180, 760), new THREE.Vector3(0, -60, 0), 1400);
  } else {
    flyTo(VIEW.pos.clone(), VIEW.tgt.clone(), 1400);
  }
}

// ── scene ────────────────────────────────────────────
function buildScene() {
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x04060c);
  scene.fog = new THREE.FogExp2(0x04060c, 0.00036);
  camera = new THREE.PerspectiveCamera(55, innerWidth / innerHeight, 1, 12000);
  camera.position.set(-400, 1150, 3200);
  renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
  renderer.setSize(innerWidth, innerHeight);
  renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
  renderer.setClearColor(0x04060c, 1);
  $('#stage').appendChild(renderer.domElement);

  controls = new THREE.OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;
  controls.dampingFactor = 0.07;
  controls.rotateSpeed = 0.55;
  controls.zoomSpeed = 0.95;
  controls.panSpeed = 0.9;
  controls.enablePan = true;
  controls.screenSpacePanning = true;   // pan follows the screen plane — intuitive drag
  controls.minDistance = 40;
  controls.maxDistance = 4200;
  controls.autoRotate = false;          // never fights the user; opt-in via Drift toggle
  controls.autoRotateSpeed = 0.16;
  controls.mouseButtons = { LEFT: THREE.MOUSE.ROTATE, MIDDLE: THREE.MOUSE.DOLLY, RIGHT: THREE.MOUSE.PAN };
  controls.touches = { ONE: THREE.TOUCH.ROTATE, TWO: THREE.TOUCH.DOLLY_PAN };

  raycaster = new THREE.Raycaster();
  raycaster.params.Points = { threshold: 6 };

  addEventListener('resize', () => {
    camera.aspect = innerWidth / innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
  });
  renderer.domElement.addEventListener('pointermove', (e) => {
    mousePx = { x: e.clientX, y: e.clientY };
    mouse.x = (e.clientX / innerWidth) * 2 - 1;
    mouse.y = -(e.clientY / innerHeight) * 2 + 1;
  });
  // the user always wins: any grab cancels automatic camera motion
  renderer.domElement.addEventListener('pointerdown', () => {
    camAnim = null;
    if (tour.playing) { tour.playing = false; updatePlayIcon(); }
    syncAutoRotate();
  });
  renderer.domElement.addEventListener('click', () => { if (hovered) openPanel(hovered); });
  renderer.domElement.addEventListener('dblclick', () => {
    const h = pickHover();
    if (h && h.type === 'hub') {
      const P = planets.find((p) => p.hub === h.hub);
      if (P) flyTo(P.pos.clone().add(new THREE.Vector3(0, P.r * 1.6, P.r * 5.5)), P.pos.clone(), 1200);
    } else if (h && h.type === 'node') {
      flyTo(h.t.pos.clone().add(new THREE.Vector3(8, 26, 90)), h.t.pos.clone(), 1200);
    } else {
      flyTo(VIEW.pos.clone(), VIEW.tgt.clone(), 1200);
    }
  });
  // space+drag = pan (left button temporarily becomes pan)
  addEventListener('keydown', (e) => {
    if (e.code !== 'Space' || spacePan) return;
    const t = document.activeElement;
    if (t && (t.tagName === 'INPUT' || t.tagName === 'TEXTAREA')) return;
    e.preventDefault();
    spacePan = true;
    controls.mouseButtons.LEFT = THREE.MOUSE.PAN;
    renderer.domElement.style.cursor = 'grab';
  });
  addEventListener('keyup', (e) => {
    if (e.code !== 'Space') return;
    spacePan = false;
    controls.mouseButtons.LEFT = THREE.MOUSE.ROTATE;
    renderer.domElement.style.cursor = 'default';
  });
}

function panelOpen(){ return $('#rpanel').classList.contains('show'); }
function syncAutoRotate(){
  controls.autoRotate = drift && !tour.playing && !camAnim && !panelOpen();
}

// ── layout ───────────────────────────────────────────
function layoutGroups() {
  const N = G.groups.length;
  const out = [];
  for (let i = 0; i < N; i++) {
    const t = N === 1 ? 0.5 : i / (N - 1);
    const x = (t - 0.5) * 2150;
    const z = Math.sin(t * Math.PI * 1.7) * 300 + (i % 2 ? 150 : -150);
    const y = Math.sin(t * Math.PI * 2.3) * 55;
    const size = G.groups[i].hubs.reduce((s, id) => s + (hubById(id) ? hubById(id).size : 0), 0);
    out.push({ pos: new THREE.Vector3(x, y, z), radius: 100 + Math.sqrt(size) * 3.4 });
  }
  return out;
}

// ── galaxy build ─────────────────────────────────────
function buildGalaxy() {
  const groupsL = layoutGroups();
  const hubPos = {};

  G.groups.forEach((g, gi) => {
    const L = groupsL[gi];
    const el = document.createElement('div');
    el.className = 'clabel';
    el.innerHTML = esc(g.name) + '<div class="rule"></div>';
    overlay.appendChild(el);
    groupAnchors.push({ group: gi, pos: L.pos.clone().add(new THREE.Vector3(0, L.radius * 0.42, 0)), radius: L.radius, labelEl: el, name: g.name });
  });
  if (G.nodes.some((n) => n[1] < 0)) {
    const el = document.createElement('div');
    el.className = 'clabel';
    el.style.opacity = '.4';
    el.innerHTML = esc(C.otherLabel) + '<div class="rule"></div>';
    overlay.appendChild(el);
    groupAnchors.push({ group: -2, pos: new THREE.Vector3(0, -170, -260), radius: 220, labelEl: el, name: C.otherLabel });
  }

  // hub size percentile → which hubs get lens-flare rays
  const sizes = G.hubs.map((h) => h.size).sort((a, b) => a - b);
  const flareMin = sizes.length ? sizes[Math.min(sizes.length - 1, Math.floor(sizes.length * 0.82))] : Infinity;

  G.hubs.forEach((h, hi) => {
    const gi = hubGroup(hi);
    if (gi < 0) return;
    const A = groupsL[gi];
    const idxInGroup = G.groups[gi].hubs.indexOf(h.id);
    const nIn = G.groups[gi].hubs.length;
    const ang = (idxInGroup / nIn) * Math.PI * 2 + gi * 1.3;
    const rad = nIn === 1 ? 0 : A.radius * (0.42 + 0.3 * ((idxInGroup % 2) ? 1 : 0.55));
    const pos = new THREE.Vector3(
      A.pos.x + Math.cos(ang) * rad,
      A.pos.y + gauss() * 26,
      A.pos.z + Math.sin(ang) * rad * 0.72
    );
    hubPos[h.id] = pos;
    const r = tangleR(h.size);      // airy line-tangle radius — not a solid ball
    const flared = h.size >= flareMin;
    const core = makeHubCore(pos, r, groupColor(gi), flared);
    const labelEl = makeHubLabel(h);
    planets.push({ hub: h, hubIdx: hi, group: gi, pos, r, flared,
      core: core.glow, spark: core.spark, hit: core.hit, labelEl, dim: false });
  });

  buildNodeParticles(hubPos);
  buildLines(hubPos);
  buildDust(groupsL);
  if (C.backdropPlanet) buildBackdropPlanet();
  valuesSorted = G.nodes.map((n) => n[2]).sort((a, b) => a - b);
}

// hub core = warm glow sprite + white spark + invisible raycast sphere (no textured planet)
function makeHubCore(pos, r, hex, flared) {
  const col = new THREE.Color(hex);
  const glow = new THREE.Sprite(new THREE.SpriteMaterial({
    map: radialTex(col), transparent: true, opacity: flared ? 0.85 : 0.55,
    blending: THREE.AdditiveBlending, depthWrite: false,
  }));
  glow.position.copy(pos);
  glow.scale.setScalar(r * (flared ? 2.6 : 1.5));
  scene.add(glow);
  const spark = new THREE.Sprite(new THREE.SpriteMaterial({
    map: dotTex(), color: 0xfff2dc, transparent: true, opacity: flared ? 1 : 0.85,
    blending: THREE.AdditiveBlending, depthWrite: false,
  }));
  spark.position.copy(pos);
  spark.scale.setScalar(r * (flared ? 0.85 : 0.4));
  scene.add(spark);
  // invisible mesh: the raycaster still intersects visible=false objects — cheap hover target
  const hit = new THREE.Mesh(
    new THREE.SphereGeometry(Math.max(10, r * 0.6), 8, 6),
    new THREE.MeshBasicMaterial()
  );
  hit.visible = false;
  hit.position.copy(pos);
  hit.updateMatrixWorld();
  scene.add(hit);
  return { glow, spark, hit };
}

function makeHubLabel(h) {
  const el = document.createElement('div');
  el.className = 'plabel';
  const gaugePct = C.showGauge && h.gaugePct != null ? h.gaugePct : null;
  el.innerHTML =
    (gaugePct != null
      ? '<div class="gauge"><div class="pct">' + Math.round(gaugePct) + '%<span>' + esc(C.gaugeLabel) + '</span></div>' +
        '<div class="bar" style="width:96px"><i style="width:' + Math.max(3, Math.min(100, gaugePct)) + '%"></i></div></div>'
      : '') +
    '<div class="nm">' + esc(h.id) + (h.name && h.name !== h.id ? ' · ' + esc(h.name) : '') + '</div>' +
    '<div class="st">' + fmt(h.size) + ' ' + esc(C.nodeUnit) + ' · ' + fmt(hubEdges(h)) + ' ' + esc(C.edgeUnit) + '</div>';
  overlay.appendChild(el);
  return el;
}

let _dotTex = null, _radials = {};
function dotTex() {
  if (_dotTex) return _dotTex;
  const c = document.createElement('canvas'); c.width = c.height = 64;
  const g = c.getContext('2d');
  const gr = g.createRadialGradient(32, 32, 0, 32, 32, 32);
  gr.addColorStop(0, 'rgba(255,255,255,1)');
  gr.addColorStop(0.4, 'rgba(255,255,255,.55)');
  gr.addColorStop(1, 'rgba(255,255,255,0)');
  g.fillStyle = gr; g.fillRect(0, 0, 64, 64);
  _dotTex = new THREE.CanvasTexture(c);
  return _dotTex;
}
function radialTex(color) {
  const key = color.getHexString();
  if (_radials[key]) return _radials[key];
  const c = document.createElement('canvas'); c.width = c.height = 128;
  const g = c.getContext('2d');
  const R = Math.round(color.r * 255), Gc = Math.round(color.g * 255), B = Math.round(color.b * 255);
  const gr = g.createRadialGradient(64, 64, 0, 64, 64, 64);
  gr.addColorStop(0, 'rgba(' + R + ',' + Gc + ',' + B + ',.85)');
  gr.addColorStop(0.35, 'rgba(' + R + ',' + Gc + ',' + B + ',.22)');
  gr.addColorStop(1, 'rgba(0,0,0,0)');
  g.fillStyle = gr; g.fillRect(0, 0, 128, 128);
  _radials[key] = new THREE.CanvasTexture(c);
  return _radials[key];
}

// ── node particles ───────────────────────────────────
function buildNodeParticles(hubPos) {
  const N = G.nodes.length;
  const pos = new Float32Array(N * 3);
  const col = new Float32Array(N * 3);
  const size = new Float32Array(N);
  const alpha = new Float32Array(N);
  const grp = new Float32Array(N);
  const core = new Float32Array(N);
  const W = new THREE.Color(0xf2ead8); // warm white — the reference mixes amber + white points
  const P = new THREE.Color(C.positive), PB = P.clone().offsetHSL(0.015, 0, 0.08), PC = W;
  const Q = new THREE.Color(C.negative), QB = Q.clone().offsetHSL(0.01, 0, 0.06), QC = Q.clone().offsetHSL(-0.02, -0.05, -0.04);
  const bandLen = 2100;

  nodeMeta = new Array(N);
  for (let i = 0; i < N; i++) {
    const [id, hubIdx, value, sub, flag] = G.nodes[i];
    let p, gi = -2;
    if (hubIdx >= 0 && G.hubs[hubIdx]) {
      const h = G.hubs[hubIdx];
      gi = hubGroup(hubIdx);
      const c = hubPos[h.id];
      const pr = tangleR(h.size);
      const a = rng() * Math.PI * 2;
      const rr = pr * 0.9 + Math.pow(rng(), 0.55) * (20 + Math.sqrt(h.size) * 2.6);
      p = new THREE.Vector3(
        c.x + Math.cos(a) * rr,
        c.y + 3 + Math.abs(gauss()) * 15,
        c.z + Math.sin(a) * rr * 0.78
      );
    } else {
      const t = rng();
      const bx = (t - 0.5) * bandLen;
      const bz = Math.sin(t * Math.PI * 1.7) * 240 + gauss() * 180;
      p = new THREE.Vector3(bx + gauss() * 110, -(6 + Math.abs(gauss()) * 30), bz + gauss() * 60);
    }
    pos[i * 3] = p.x; pos[i * 3 + 1] = p.y; pos[i * 3 + 2] = p.z;

    const base = flag > 0 ? [P, PB, PC][Math.floor(rng() * 3)] : [Q, QB, QC][Math.floor(rng() * 3)];
    const jit = 0.88 + rng() * 0.24;
    col[i * 3] = Math.min(1, base.r * jit);
    col[i * 3 + 1] = Math.min(1, base.g * jit);
    col[i * 3 + 2] = Math.min(1, base.b * jit);

    size[i] = 2.2 + Math.min(6, Math.sqrt(value) * 0.6) + (rng() < 0.05 ? 2.2 : 0);
    alpha[i] = hubIdx >= 0 ? 0.95 : 0.55;
    grp[i] = gi;
    core[i] = value;
    nodeMeta[i] = { id, hubIdx, value, sub, flag, pos: p };
  }

  // echo particles — activity density proportional to node value
  const eArr = { pos: [], col: [], size: [], alpha: [], grp: [], refs: [] };
  for (let i = 0; i < N; i++) {
    const m = nodeMeta[i];
    if (m.value <= 0) continue;
    const eN = Math.max(2, Math.min(14, Math.round(m.value * 0.4)));
    for (let e = 0; e < eN; e++) {
      const a2 = rng() * Math.PI * 2;
      const rr2 = 2.5 + Math.pow(rng(), 0.7) * 12;
      eArr.pos.push(m.pos.x + Math.cos(a2) * rr2, m.pos.y + gauss() * 6, m.pos.z + Math.sin(a2) * rr2 * 0.8);
      const ci = i * 3;
      const cj = 0.7 + rng() * 0.45;
      eArr.col.push(Math.min(1, col[ci] * cj), Math.min(1, col[ci + 1] * cj), Math.min(1, col[ci + 2] * cj));
      eArr.size.push(0.9 + rng() * 1.4);
      eArr.alpha.push(0.35 + rng() * 0.25);
      eArr.grp.push(grp[i]);
      eArr.refs.push(m.value);
    }
  }

  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  geo.setAttribute('aColor', new THREE.BufferAttribute(col, 3));
  geo.setAttribute('aSize', new THREE.BufferAttribute(size, 1));
  geo.setAttribute('aAlpha', new THREE.BufferAttribute(alpha, 1));
  geo.setAttribute('aGroup', new THREE.BufferAttribute(grp, 1));
  geo.setAttribute('aRefs', new THREE.BufferAttribute(core, 1));

  const mat = new THREE.ShaderMaterial({
    transparent: true, depthWrite: false, blending: THREE.AdditiveBlending,
    uniforms: {
      uGroup: { value: -1 }, uCore: { value: 0 }, uCoreThresh: { value: C.coreThreshold },
      uPx: { value: Math.min(devicePixelRatio, 2) }, uTime: { value: 0 },
    },
    vertexShader: [
      'attribute vec3 aColor; attribute float aSize, aAlpha, aGroup, aRefs;',
      'uniform float uGroup, uCore, uCoreThresh, uPx, uTime;',
      'varying vec3 vColor; varying float vAlpha;',
      'void main(){',
      '  vColor = aColor;',
      '  float a = aAlpha;',
      '  if (uGroup > -0.5) { a *= (abs(aGroup - uGroup) < .5) ? 1.0 : 0.07; }',
      '  else if (uGroup < -1.5) { a *= (aGroup < -1.5) ? 1.0 : 0.07; }',
      '  float s = aSize;',
      '  if (uCore > .5) {',
      '    if (aRefs < uCoreThresh) { a *= 0.1; s *= 0.7; } else { s *= 1.35; a = min(1., a*1.2); }',
      '  }',
      '  a *= 0.82 + 0.18 * sin(uTime*1.7 + position.x*0.13 + position.z*0.09);',
      '  vAlpha = a;',
      '  vec4 mv = modelViewMatrix * vec4(position, 1.);',
      '  gl_PointSize = clamp(s * uPx * (720.0 / -mv.z), 2.0 * uPx, 28.0);',
      '  gl_Position = projectionMatrix * mv;',
      '}',
    ].join('\n'),
    fragmentShader: [
      'varying vec3 vColor; varying float vAlpha;',
      'void main(){',
      '  vec2 uv = gl_PointCoord - .5;',
      '  float d = length(uv);',
      '  if (d > .5) discard;',
      '  float glow = pow(smoothstep(.5, .0, d), 1.1);',
      '  float core = smoothstep(.24, .0, d);',
      '  gl_FragColor = vec4(vColor * (1.0 + core * 1.6), vAlpha * glow);',
      '}',
    ].join('\n'),
  });
  tablePoints = new THREE.Points(geo, mat);
  scene.add(tablePoints);

  const egeo = new THREE.BufferGeometry();
  egeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(eArr.pos), 3));
  egeo.setAttribute('aColor', new THREE.BufferAttribute(new Float32Array(eArr.col), 3));
  egeo.setAttribute('aSize', new THREE.BufferAttribute(new Float32Array(eArr.size), 1));
  egeo.setAttribute('aAlpha', new THREE.BufferAttribute(new Float32Array(eArr.alpha), 1));
  egeo.setAttribute('aGroup', new THREE.BufferAttribute(new Float32Array(eArr.grp), 1));
  egeo.setAttribute('aRefs', new THREE.BufferAttribute(new Float32Array(eArr.refs), 1));
  echoPoints = new THREE.Points(egeo, mat);
  scene.add(echoPoints);
}

// ── lines: tangles + flares + dep arcs + node links + ambient arcs ──
// All thin 1px additive lines batched into ONE LineSegments draw call.
// aKind: 0 tangle · 1 flare · 2 hub-dep arc · 3 node link · 4 ambient arc
function buildLines(hubPos) {
  const pos = [], col = [], alp = [], grp = [], kind = [];
  const tmpA = new THREE.Vector3(), tmpB = new THREE.Vector3();
  const AMBERS = ['#f0a441', '#ffc873', '#c8843a', '#a06a30', '#e8ddc8'];
  const seg = (a, b, cc, aa, g, k) => {
    pos.push(a.x, a.y, a.z, b.x, b.y, b.z);
    col.push(cc.r, cc.g, cc.b, cc.r, cc.g, cc.b);
    alp.push(aa, aa); grp.push(g, g); kind.push(k, k);
  };
  const curveSegs = (curve, n, cc, aa, g, k) => {
    let prev = curve.getPoint(0);
    for (let i = 1; i <= n; i++) {
      const p = curve.getPoint(i / n);
      seg(prev, p, cc, aa, g, k);
      prev = p;
    }
  };

  // 1) scribble tangles — thin wobbly ellipse loops around each hub core
  planets.forEach((P) => {
    const loops = 7 + Math.min(9, Math.round(Math.sqrt(P.hub.size) * 0.5));
    const gcol = new THREE.Color(groupColor(P.group));
    for (let l = 0; l < loops; l++) {
      const a = P.r * (0.5 + rng() * 0.75);
      const b = a * (0.35 + rng() * 0.5);
      const e = new THREE.Euler(rng() * Math.PI, rng() * Math.PI, rng() * Math.PI);
      const cc = rng() < 0.25 ? new THREE.Color(0xe8ddc8) : gcol.clone();
      cc.multiplyScalar(0.5 + rng() * 0.5);
      const aa = 0.10 + rng() * 0.16;
      const SEGS = 44;
      let prev = null;
      for (let i = 0; i <= SEGS; i++) {
        const t = (i / SEGS) * Math.PI * 2;
        tmpA.set(Math.cos(t) * a, Math.sin(t) * b, 0).applyEuler(e);
        tmpA.x += gauss() * P.r * 0.05; tmpA.y += gauss() * P.r * 0.05; tmpA.z += gauss() * P.r * 0.05;
        tmpA.add(P.pos);
        if (prev) seg(prev, tmpA, cc, aa, P.group, 0);
        prev = tmpA.clone();
      }
    }
  });

  // 2) lens-flare rays on the biggest hubs (the bright "suns" in the reference)
  planets.forEach((P) => {
    if (!P.flared) return;
    for (let i = 0; i < 6; i++) {
      const ang = rng() * Math.PI * 2;
      const len = P.r * (3.5 + rng() * 4.5);
      const dir = new THREE.Vector3(Math.cos(ang), gauss() * 0.22, Math.sin(ang)).normalize();
      const cc = new THREE.Color(0xffd9a0);
      // bright near the core → fade outward: split each ray into two alpha tiers
      tmpB.copy(P.pos).addScaledVector(dir, len * 0.35);
      tmpA.copy(P.pos).addScaledVector(dir, len);
      seg(P.pos, tmpB, cc, 0.5, P.group, 1);
      seg(tmpB, tmpA, cc, 0.12, P.group, 1);
      tmpB.copy(P.pos).addScaledVector(dir, -len * 0.35);
      tmpA.copy(P.pos).addScaledVector(dir, -len);
      seg(P.pos, tmpB, cc, 0.5, P.group, 1);
      seg(tmpB, tmpA, cc, 0.12, P.group, 1);
    }
  });

  // 3) hub dependency arcs (bright amber beziers)
  let maxW = 1;
  G.hubs.forEach((h) => (h.deps || []).forEach(([, w]) => { if (w > maxW) maxW = w; }));
  const drawn = new Set();
  G.hubs.forEach((h, hi) => {
    (h.deps || []).forEach(([to, w]) => {
      const key = [h.id, to].sort().join('|');
      if (drawn.has(key)) return;
      drawn.add(key);
      const a = hubPos[h.id], b = hubPos[to];
      if (!a || !b) return;
      const mid = a.clone().add(b).multiplyScalar(0.5);
      mid.y += 40 + Math.min(140, a.distanceTo(b) * 0.14);
      const curve = new THREE.QuadraticBezierCurve3(a, mid, b);
      const cc = new THREE.Color(AMBERS[Math.floor(rng() * 3)]);
      const aa = 0.10 + 0.22 * Math.min(1, w / maxW);
      curveSegs(curve, 40, cc, aa, hubGroup(hi), 2);
    });
  });

  // 4) node-level links (dim filaments) — sampled by the builder into G.links
  const links = (G.links || []).slice(0, C.linkCap);
  links.forEach(([ai, bi, w]) => {
    const A = nodeMeta[ai], B = nodeMeta[bi];
    if (!A || !B) return;
    const mid = A.pos.clone().add(B.pos).multiplyScalar(0.5);
    mid.y += 8 + Math.min(60, A.pos.distanceTo(B.pos) * 0.10);
    const curve = new THREE.QuadraticBezierCurve3(A.pos, mid, B.pos);
    const cc = new THREE.Color(rng() < 0.6 ? AMBERS[Math.floor(rng() * AMBERS.length)] : '#c8beac');
    const aa = 0.05 + Math.min(0.12, (w || 1) * 0.02);
    const gA = A.hubIdx >= 0 ? hubGroup(A.hubIdx) : -2;
    curveSegs(curve, 20, cc, aa, gA, 3);
  });

  // 5) ambient arcs — long criss-crossing filaments spanning the whole scene
  const hubList = planets.map((p) => p.pos);
  const nAmb = C.ambientArcs != null ? C.ambientArcs
    : Math.min(110, Math.max(50, hubList.length * 5));
  for (let i = 0; i < nAmb && hubList.length > 1; i++) {
    const a = hubList[Math.floor(rng() * hubList.length)];
    let b = hubList[Math.floor(rng() * hubList.length)];
    let tries = 0;
    while (a.distanceTo(b) < 650 && tries++ < 6) b = hubList[Math.floor(rng() * hubList.length)];
    const pa = a.clone().add(new THREE.Vector3(gauss() * 130, gauss() * 60, gauss() * 130));
    const pb = b.clone().add(new THREE.Vector3(gauss() * 130, gauss() * 60, gauss() * 130));
    const mid = pa.clone().add(pb).multiplyScalar(0.5);
    const straight = rng() < 0.4; // some near-straight lines like the reference
    mid.y += straight ? gauss() * 25 : 60 + rng() * 260;
    mid.x += straight ? 0 : gauss() * 180;
    const curve = new THREE.QuadraticBezierCurve3(pa, mid, pb);
    const cc = new THREE.Color(rng() < 0.7 ? AMBERS[Math.floor(rng() * AMBERS.length)] : '#aab4c4');
    cc.multiplyScalar(0.55 + rng() * 0.45);
    curveSegs(curve, 52, cc, 0.03 + rng() * 0.06, -3, 4);
  }

  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(pos), 3));
  geo.setAttribute('aColor', new THREE.BufferAttribute(new Float32Array(col), 3));
  geo.setAttribute('aAlpha', new THREE.BufferAttribute(new Float32Array(alp), 1));
  geo.setAttribute('aGroup', new THREE.BufferAttribute(new Float32Array(grp), 1));
  geo.setAttribute('aKind', new THREE.BufferAttribute(new Float32Array(kind), 1));
  lineMat = new THREE.ShaderMaterial({
    transparent: true, depthWrite: false, blending: THREE.AdditiveBlending,
    uniforms: { uGroup: { value: -1 }, uClusters: { value: 0 } },
    vertexShader: [
      'attribute vec3 aColor; attribute float aAlpha, aGroup, aKind;',
      'uniform float uGroup, uClusters;',
      'varying vec3 vC; varying float vA;',
      'void main(){',
      '  vC = aColor;',
      '  float a = aAlpha;',
      '  if (uGroup > -0.5) { a *= (abs(aGroup - uGroup) < .5) ? 1.0 : ((aKind > 3.5) ? .25 : .05); }',
      '  else if (uGroup < -1.5) { a *= (aGroup < -1.5) ? 1.0 : .05; }',
      '  if (uClusters > .5 && abs(aKind - 3.0) < .5) a = 0.;',
      '  vA = a;',
      '  gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.);',
      '}',
    ].join('\n'),
    fragmentShader: [
      'varying vec3 vC; varying float vA;',
      'void main(){ gl_FragColor = vec4(vC, vA); }',
    ].join('\n'),
  });
  scene.add(new THREE.LineSegments(geo, lineMat));
}

// ── dust + nebula streaks ────────────────────────────
function buildDust(groupsL) {
  const N = 3600;
  const pos = new Float32Array(N * 3);
  const col = new Float32Array(N * 3);
  const size = new Float32Array(N);
  for (let i = 0; i < N; i++) {
    let p;
    if (i < N * 0.62) {
      const t = rng();
      const x = (t - 0.5) * 2400;
      const z = Math.sin(t * Math.PI * 1.7) * 240 + gauss() * 130;
      p = new THREE.Vector3(x, gauss() * 70, z + gauss() * 90);
    } else {
      const A = groupsL[Math.floor(rng() * groupsL.length)];
      p = new THREE.Vector3(
        A.pos.x + gauss() * A.radius * 1.15,
        A.pos.y + gauss() * 46,
        A.pos.z + gauss() * A.radius * 0.85
      );
    }
    pos[i * 3] = p.x; pos[i * 3 + 1] = p.y; pos[i * 3 + 2] = p.z;
    const v = 0.5 + rng() * 0.45;
    const roll = rng();
    if (roll < 0.55)      { col[i*3] = v;      col[i*3+1] = v*0.78; col[i*3+2] = v*0.52; } // amber
    else if (roll < 0.85) { col[i*3] = v;      col[i*3+1] = v*0.94; col[i*3+2] = v*0.85; } // warm white
    else                  { col[i*3] = v*0.78; col[i*3+1] = v*0.87; col[i*3+2] = v;      } // cool
    size[i] = 0.9 + rng() * 2.3;
  }
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  geo.setAttribute('aColor', new THREE.BufferAttribute(col, 3));
  geo.setAttribute('aSize', new THREE.BufferAttribute(size, 1));
  const mat = new THREE.ShaderMaterial({
    transparent: true, depthWrite: false, blending: THREE.AdditiveBlending,
    uniforms: { uPx: { value: Math.min(devicePixelRatio, 2) }, uMul: { value: 1 } },
    vertexShader: [
      'attribute vec3 aColor; attribute float aSize;',
      'uniform float uPx; varying vec3 vC;',
      'void main(){ vC = aColor;',
      '  vec4 mv = modelViewMatrix * vec4(position,1.);',
      '  gl_PointSize = clamp(aSize * uPx * (620.0 / -mv.z), 1.1 * uPx, 26.0);',
      '  gl_Position = projectionMatrix * mv; }',
    ].join('\n'),
    fragmentShader: [
      'varying vec3 vC; uniform float uMul;',
      'void main(){ vec2 uv = gl_PointCoord - .5; float d = length(uv);',
      '  if (d>.5) discard;',
      '  gl_FragColor = vec4(vC, .30 * uMul * pow(smoothstep(.5,.0,d), 1.5)); }',
    ].join('\n'),
  });
  scene.add(new THREE.Points(geo, mat));
  window.__dustMat = mat;

  // horizontal light streaks — the warm nebula bands crossing the reference image
  const NEB = ['#c87f3a', '#f0a441', '#8a5a30', '#5a6a85'];
  for (let i = 0; i < 14; i++) {
    const t = rng();
    const sp = new THREE.Sprite(new THREE.SpriteMaterial({
      map: radialTex(new THREE.Color(NEB[i % NEB.length])), transparent: true,
      opacity: 0.035 + rng() * 0.05,
      blending: THREE.AdditiveBlending, depthWrite: false,
    }));
    sp.position.set((t - 0.5) * 2100 + gauss() * 160, gauss() * 80, Math.sin(t * Math.PI * 1.7) * 240 + gauss() * 140);
    sp.scale.set(420 + rng() * 680, 70 + rng() * 160, 1);
    scene.add(sp);
  }
}

// ── backdrop ringed planet (dark silhouette, far behind the band) ──
function buildBackdropPlanet() {
  const R = 520;
  const grp = new THREE.Group();
  grp.position.set(480, 140, -2100);

  const c = document.createElement('canvas'); c.width = c.height = 512;
  const g = c.getContext('2d');
  g.fillStyle = '#0b0d12'; g.fillRect(0, 0, 512, 512);
  const rim = g.createRadialGradient(340, 170, 40, 340, 170, 420);
  rim.addColorStop(0, 'rgba(240,164,65,.14)');
  rim.addColorStop(0.5, 'rgba(160,106,48,.05)');
  rim.addColorStop(1, 'rgba(0,0,0,0)');
  g.fillStyle = rim; g.fillRect(0, 0, 512, 512);
  for (let i = 0; i < 14; i++) {
    g.fillStyle = 'rgba(0,0,0,' + (0.08 + rng() * 0.15) + ')';
    g.fillRect(0, rng() * 512, 512, 6 + rng() * 26);
  }
  const sphere = new THREE.Mesh(
    new THREE.SphereGeometry(R, 48, 32),
    new THREE.MeshBasicMaterial({ map: new THREE.CanvasTexture(c), fog: false })
  );
  grp.add(sphere);

  const mkRing = (r0, r1, color, opacity, blend) => new THREE.Mesh(
    new THREE.RingGeometry(r0, r1, 96),
    new THREE.MeshBasicMaterial({
      color, transparent: true, opacity, side: THREE.DoubleSide,
      blending: blend, depthWrite: false, fog: false,
    })
  );
  const rings = new THREE.Group();
  rings.add(mkRing(R * 1.45, R * 1.9, 0xc8843a, 0.10, THREE.AdditiveBlending));
  rings.add(mkRing(R * 1.95, R * 2.4, 0xf0a441, 0.05, THREE.AdditiveBlending));
  rings.add(mkRing(R * 1.3, R * 1.42, 0x000000, 0.55, THREE.NormalBlending));
  rings.rotation.set(1.32, -0.14, 0.32);
  grp.add(rings);
  scene.add(grp);
}

// ── overlay projection ───────────────────────────────
const _v = new THREE.Vector3();
function project(p) {
  _v.copy(p).project(camera);
  if (_v.z > 1) return null;
  return { x: (_v.x * 0.5 + 0.5) * innerWidth, y: (-_v.y * 0.5 + 0.5) * innerHeight };
}
function pxPerWorld(dist) {
  return (innerHeight * 0.5) / (Math.tan((camera.fov * Math.PI) / 360) * dist);
}
function updateOverlays() {
  const cp = camera.position;
  groupAnchors.forEach((a) => {
    const s = project(a.pos);
    const el = a.labelEl;
    if (!s) { el.style.display = 'none'; return; }
    const dist = cp.distanceTo(a.pos);
    const fs = Math.max(11, Math.min(44, pxPerWorld(dist) * a.radius * 0.22));
    const fade = dist < a.radius * 1.1 ? Math.max(0, (dist - a.radius * 0.5) / (a.radius * 0.6)) : 1;
    const dimmed = activeGroup >= 0 && a.group !== activeGroup && a.group !== -2 ? 0.12 : 1;
    el.style.display = 'block';
    el.style.left = s.x + 'px'; el.style.top = s.y + 'px';
    el.style.fontSize = fs + 'px';
    el.style.opacity = (a.group === -2 ? 0.4 : 0.85) * fade * dimmed;
  });
  planets.forEach((P) => {
    const el = P.labelEl;
    const top = P.pos.clone(); top.y += P.r * 1.15;
    const s = project(top);
    if (!s) { el.style.display = 'none'; return; }
    const dist = cp.distanceTo(P.pos);
    const k = pxPerWorld(dist) * P.r;
    if (k < 10 || dist > 2800) { el.style.display = 'none'; return; }
    const dimmed = P.dim ? 0.08 : 1;
    el.style.display = 'block';
    el.style.left = s.x + 'px';
    el.style.top = (s.y - 26) + 'px';
    el.style.opacity = Math.min(1, (k - 10) / 14) * dimmed;
    const pct = el.querySelector('.pct');
    if (pct) {
      pct.style.fontSize = Math.max(11, Math.min(22, k * 0.4)) + 'px';
      el.querySelector('.bar').style.width = Math.max(64, Math.min(140, k * 2.2)) + 'px';
    }
    P.core.material.opacity = (P.flared ? 0.85 : 0.55) * dimmed;
    P.spark.material.opacity = (P.flared ? 1 : 0.85) * dimmed;
  });
}

// ── hover ────────────────────────────────────────────
function pickHover() {
  raycaster.setFromCamera(mouse, camera);
  const hitP = raycaster.intersectObjects(planets.map((p) => p.hit), false)[0];
  if (hitP) {
    const P = planets.find((p) => p.hit === hitP.object);
    if (!P.dim) return { type: 'hub', hub: P.hub, group: P.group };
  }
  if (tablePoints && !clustersOnly) {
    const hitT = raycaster.intersectObject(tablePoints, false)[0];
    if (hitT && hitT.index != null) {
      const t = nodeMeta[hitT.index];
      if (activeGroup >= 0) {
        const gi = t.hubIdx >= 0 ? hubGroup(t.hubIdx) : -2;
        if (gi !== activeGroup) return null;
      }
      return { type: 'node', t };
    }
  }
  return null;
}

function renderHover(h) {
  const el = $('#hover');
  if (!h) { el.classList.remove('show'); document.body.style.cursor = spacePan ? 'grab' : 'default'; return; }
  document.body.style.cursor = 'pointer';
  el.innerHTML = h.type === 'hub' ? hubHoverHTML(h.hub) : nodeHoverHTML(h.t);
  el.classList.add('show');
  const w = el.offsetWidth, hh = el.offsetHeight;
  let x = mousePx.x + 16, y = mousePx.y + 14;
  if (x + w > innerWidth - 12) x = mousePx.x - w - 14;
  if (y + hh > innerHeight - 12) y = mousePx.y - hh - 12;
  el.style.left = x + 'px'; el.style.top = y + 'px';
}

function groupOfNode(t) {
  if (t.hubIdx < 0) return null;
  return G.groups[hubGroup(t.hubIdx)] || null;
}

function nodeHoverHTML(t) {
  const g = groupOfNode(t);
  const hub = t.hubIdx >= 0 ? G.hubs[t.hubIdx] : null;
  return '<div class="kind">' + esc(C.nodeLabel) + ' · ' + (g ? esc(g.name) : esc(C.orphanLabel)) + '</div>' +
    '<div class="name">' + esc(t.id) + '</div>' +
    '<div class="row"><span>' + esc(C.hubLabel) + '</span><b>' + (hub ? esc(hub.id) + (hub.name && hub.name !== hub.id ? ' ' + esc(hub.name) : '') : '—') + '</b></div>' +
    '<div class="row"><span>' + esc(C.subValueLabel) + '</span><b>' + fmt(t.sub) + '</b></div>' +
    '<div class="row"><span>' + esc(C.valueLabel) + '</span><b class="' + (t.value > 0 ? 'pos' : 'neg') + '">' + (t.value > 0 ? '+' + fmt(t.value) : '0') + '</b></div>' +
    '<div class="row"><span>' + esc(C.flagLabel) + '</span><b class="' + (t.flag > 0 ? 'pos' : 'neg') + '">' + (t.flag > 0 ? esc(C.flagTrueText).replace('{n}', t.flag) : esc(C.flagFalseText)) + '</b></div>';
}

function hubHoverHTML(h) {
  const gi = G.groups.findIndex((g) => g.hubs.includes(h.id));
  const g = G.groups[gi];
  const hue = groupColor(gi);
  let html = '<div class="kind">' + esc(C.hubLabel) + ' · ' + esc(g.name) + '</div>' +
    '<div class="name">' + esc(h.id) + (h.name && h.name !== h.id ? ' · ' + esc(h.name) : '') + '</div>';
  Object.entries(h.metrics || {}).forEach(([k, v]) => {
    html += '<div class="row"><span>' + esc(k) + '</span><b>' + esc(typeof v === 'number' ? fmt(v) : v) + '</b></div>';
  });
  if (h.top && h.top.length) {
    html += '<div class="sect"><div class="sh"><span>Top ' + esc(C.nodeLabel.toLowerCase()) + 's</span><span>' + h.top.length + '</span></div>';
    h.top.slice(0, 5).forEach((tt) => {
      html += '<div class="item"><div class="thumb" style="background:' + hue + '">•</div><div class="t">' + esc(tt.id) + '</div><span class="val">+' + fmt(tt.value) + '</span></div>';
    });
    html += '</div>';
  }
  return html;
}

// ── right panel ──────────────────────────────────────
function percentile(v) {
  let lo = 0, hi = valuesSorted.length;
  while (lo < hi) { const mid = (lo + hi) >> 1; if (valuesSorted[mid] <= v) lo = mid + 1; else hi = mid; }
  return Math.round((lo / valuesSorted.length) * 100);
}

function openPanel(h) {
  $('#hover').classList.remove('show');
  document.body.style.cursor = 'default';
  const inner = $('#rpInner');
  inner.innerHTML = h.type === 'hub' ? hubPanelHTML(h.hub) : nodePanelHTML(h.t);
  $('#rpanel').classList.add('show');
  $('#dimmer').classList.add('show');
  inner.querySelectorAll('[data-goto]').forEach((el) => {
    el.addEventListener('click', () => searchGoto(el.dataset.goto));
  });
  syncAutoRotate();
}
function closePanel() {
  $('#rpanel').classList.remove('show');
  $('#dimmer').classList.remove('show');
  syncAutoRotate();
}

function nodePanelHTML(t) {
  const score = percentile(t.value);
  const level = t.value === 0 ? 'LOW' : score >= 90 ? 'CORE' : score >= 60 ? 'HIGH' : 'MID';
  const g = groupOfNode(t);
  const hub = t.hubIdx >= 0 ? G.hubs[t.hubIdx] : null;
  return '<div class="rp-head"><div>' +
    '<div class="rp-badges"><span class="rp-badge ' + (level === 'CORE' || level === 'HIGH' ? 'hi' : '') + '">' + level + '</span><span class="rp-tag">◦ ' + esc(C.nodeLabel) + '</span></div>' +
    '<div class="rp-id">' + esc(t.id) + '</div>' +
    '<div class="rp-sub">' + esc(C.subValueLabel) + ' ' + fmt(t.sub) + '</div>' +
    '<div class="rp-status"><span class="gd"></span>' + esc(C.valueLabel) + ' ' + fmt(t.value) + ' · ' + esc(C.flagLabel) + ' ' + (t.flag > 0 ? esc(C.flagTrueText).replace('{n}', t.flag) : esc(C.flagFalseText)) + '</div>' +
    '</div><div class="rp-score"><b>' + score + '</b><span>CORE SCORE</span></div></div>' +
    '<div class="rp-trio">' +
    '<div class="cell"><div class="l">' + esc(C.subValueLabel) + '</div><div class="v">' + fmt(t.sub) + '</div></div>' +
    '<div class="cell"><div class="l">' + esc(C.valueLabel) + '</div><div class="v teal">' + (t.value > 0 ? '+' + fmt(t.value) : '0') + '</div></div>' +

    '<div class="rp-pill"><span class="pd"></span>' + (g ? esc(g.name) + (hub ? ' · ' + esc(hub.id) : '') : 'UNASSIGNED') + '</div>' +
    '<div class="rp-big"><div class="l">' + esc(C.valueLabel) + '</div><div class="n">' + (t.value > 0 ? '+' + fmt(t.value) : '0') + '</div></div>';

function hubPanelHTML(h) {

    h.top.forEach((tt) => {

    });
    html += '</div></div>';

  if (h.deps && h.deps.length) {

// ── UI bindings ──────────────────────────────────────
function bindUI() {
  $('#rpClose').addEventListener('click', closePanel);
  $('#dimmer').addEventListener('click', closePanel);
  addEventListener('keydown', (e) => {
    const t = document.activeElement;
    const typing = t && (t.tagName === 'INPUT' || t.tagName === 'TEXTAREA');
    if (e.key === 'Escape') closePanel();
    if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === 'k') { e.preventDefault(); $('#searchInput').focus(); }
    if (!typing && (e.key === 'r' || e.key === 'R')) flyTo(VIEW.pos.clone(), VIEW.tgt.clone(), 1200);
  });
  $('#tgDrift').addEventListener('click', function () {
    drift = !drift;
    this.classList.toggle('on', drift);
    this.querySelector('.state').textContent = drift ? 'ON' : 'OFF';
    syncAutoRotate();
  });
  if (drift) { $('#tgDrift').classList.add('on'); $('#tgDrift').querySelector('.state').textContent = 'ON'; }
  $('#tgCore').addEventListener('click', function () {
    coreMode = !coreMode;
    this.classList.toggle('on', coreMode);
    this.querySelector('.state').textContent = coreMode ? 'ON' : 'OFF';
    if (tablePoints) tablePoints.material.uniforms.uCore.value = coreMode ? 1 : 0;
  });
  $('#tgClusters').addEventListener('click', function () {
    clustersOnly = !clustersOnly;
    this.classList.toggle('on', clustersOnly);
    this.querySelector('.state').textContent = clustersOnly ? 'ON' : 'OFF';
    if (tablePoints) tablePoints.visible = !clustersOnly;
    if (echoPoints) echoPoints.visible = !clustersOnly;
    if (lineMat) lineMat.uniforms.uClusters.value = clustersOnly ? 1 : 0;
    if (window.__dustMat) window.__dustMat.uniforms.uMul.value = clustersOnly ? 0.35 : 1;
  });
  $('#recenter').addEventListener('click', () => flyTo(VIEW.pos.clone(), VIEW.tgt.clone(), 1200));
  document.querySelectorAll('.speed').forEach((b) => {
    b.addEventListener('click', () => {
      document.querySelectorAll('.speed').forEach((x) => x.classList.remove('on'));
      b.classList.add('on');
      tour.speed = parseFloat(b.dataset.s);
    });
  });
  $('#playbtn').addEventListener('click', toggleTour);
  const tl = $('#timeline');
  let dragging = false;
  const setT = (e) => {
    const r = tl.getBoundingClientRect();
    tour.t = Math.max(0, Math.min(1, (e.clientX - r.left) / r.width));
    tour.playing = false; camAnim = null; updatePlayIcon();
    applyTour();
  };
  tl.addEventListener('pointerdown', (e) => { dragging = true; setT(e); tl.setPointerCapture(e.pointerId); });
  tl.addEventListener('pointermove', (e) => dragging && setT(e));
  tl.addEventListener('pointerup', () => (dragging = false));
  $('#searchInput').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') searchGoto(e.target.value.trim());
  });
}

function searchGoto(q) {
  if (!q) return;
  const Q = q.toUpperCase();
  const hi = G.hubs.findIndex((h) => h.id.toUpperCase() === Q);
  if (hi >= 0) {
    const P = planets.find((p) => p.hubIdx === hi);
    if (P) {
      flyTo(P.pos.clone().add(new THREE.Vector3(0, P.r * 1.6, P.r * 5.5)), P.pos.clone(), 1300);
      openPanel({ type: 'hub', hub: P.hub });
      return;
    }
  }
  const ti = nodeMeta.findIndex((t) => String(t.id).toUpperCase() === Q);
  if (ti >= 0) {
    const t = nodeMeta[ti];
    flyTo(t.pos.clone().add(new THREE.Vector3(8, 26, 90)), t.pos.clone(), 1300);
    openPanel({ type: 'node', t });
    return;
  }
  const inp = $('#searchInput');
  inp.style.color = C.accent;
  setTimeout(() => (inp.style.color = ''), 600);
}

// ── camera anim / tour ───────────────────────────────
function flyTo(pos, target, dur) {
  camAnim = {
    fromP: camera.position.clone(), toP: pos,
    fromT: controls.target.clone(), toT: target,
    t0: performance.now(), dur,
  };
  syncAutoRotate();
}
function stepCamAnim(now) {
  if (!camAnim) return;
  const k = Math.min(1, (now - camAnim.t0) / camAnim.dur);
  const e = 1 - Math.pow(1 - k, 3);
  camera.position.lerpVectors(camAnim.fromP, camAnim.toP, e);
  controls.target.lerpVectors(camAnim.fromT, camAnim.toT, e);
  if (k >= 1) {
    camAnim = null;
    syncAutoRotate();
  }
}
function buildTourCurve() {
  const pts = [new THREE.Vector3(-1350, 420, 1500)];
  const names = ['OVERVIEW'];
  groupAnchors.filter((a) => a.group >= 0).forEach((a) => {
    pts.push(a.pos.clone().add(new THREE.Vector3(30, a.radius * 0.55, a.radius * 1.7)));
    names.push(a.name);
  });
  pts.push(VIEW.pos.clone());
  names.push('LIVE');
  tour.curve = new THREE.CatmullRomCurve3(pts, false, 'centripetal', 0.4);
  tour.names = names;
}
function toggleTour() {
  if (!tour.curve) buildTourCurve();
  if (tour.playing) { tour.playing = false; }
  else {
    if (tour.t >= 0.999) tour.t = 0;
    tour.playing = true;
  }
  syncAutoRotate();
  updatePlayIcon();
}
function updatePlayIcon() {
  $('#playIco').innerHTML = tour.playing
    ? '<path d="M1.5 1h2.6v8H1.5zM5.9 1h2.6v8H5.9z"/>'
    : '<path d="M2 1l7 4-7 4z"/>';
}
function applyTour() {
  if (!tour.curve) buildTourCurve();
  const t = Math.min(0.9999, tour.t);
  const p = tour.curve.getPoint(t);
  const ahead = tour.curve.getPoint(Math.min(0.9999, t + 0.03));
  camera.position.copy(p);
  controls.target.lerp(ahead, 0.6);
  const live = tour.t >= 0.999;
  $('#livestat').classList.toggle('scrub', !live);
  const ni = Math.min(tour.names.length - 1, Math.floor(t * (tour.names.length - 1) + 0.5));
  $('#liveTxt').textContent = live ? 'LIVE' : tour.names[ni];
  $('#tlFill').style.width = (tour.t * 100) + '%';
  $('#tlKnob').style.left = (tour.t * 100) + '%';
  syncAutoRotate();
}

// ── main loop ────────────────────────────────────────
let lastHoverCheck = 0, lastFrame = 0;
function animate() {
  requestAnimationFrame(animate);
  const now = performance.now();
  const dt = Math.min(50, now - (lastFrame || now));
  lastFrame = now;
  if (tablePoints) tablePoints.material.uniforms.uTime.value = now / 1000;
  if (tour.playing) {
    tour.t = Math.min(1, tour.t + 0.00006 * tour.speed * dt);
    applyTour();
    if (tour.t >= 1) { tour.playing = false; updatePlayIcon(); applyTour(); }
  } else {
    stepCamAnim(now);
  }
  controls.update();
  if (now - lastHoverCheck > 40 && !panelOpen()) {
    lastHoverCheck = now;
    hovered = pickHover();
    renderHover(hovered);
  }
  updateOverlays();
  renderer.render(scene, camera);
}

init();
})();
</script>

<style id="bg-mode">
  /* Background mode: hide interactive chrome, keep the orbiting galaxy + labels. */
  #tabs, #search, #controls, #legend, #hovercard, #boot, #hints, #sublabel,
  .panel, .hovercard, .hud, header, .logo, .livechip, .beta, .speed, .toggle,
  .gauge, .searchwrap { display: none !important; }
  #stage { pointer-events: none !important; }
  body { background: #05070d !important; }
  #overlay .l { opacity: 0.6; }
</style>
